<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard - Budgetly</title>

  <script>
    tailwind.config = { darkMode: 'class' }
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-white text-black min-h-screen flex">

  <!-- SIDEBAR -->
  <aside class="w-64 border-r border-black p-6 flex flex-col">

    <h1 class="text-2xl font-bold mb-10">Budgetly</h1>

    <nav class="space-y-4">

      <button onclick="showSection('overview')" 
        class="w-full text-left px-4 py-2 rounded hover:bg-black hover:text-white transition">
        Overview
      </button>

      <button onclick="showSection('transactions')" 
        class="w-full text-left px-4 py-2 rounded hover:bg-black hover:text-white transition">
        Transactions
      </button>

      <button onclick="showSection('wallets')" 
        class="w-full text-left px-4 py-2 rounded hover:bg-black hover:text-white transition">
        Wallets
      </button>

    </nav>

    <div class="mt-auto">
      <button onclick="logout()" 
        class="w-full border border-black px-4 py-2 rounded-lg hover:bg-black hover:text-white transition">
        Logout
      </button>
    </div>

  </aside>

  <!-- MAIN CONTENT -->
  <main class="flex-1 p-10">

    <!-- OVERVIEW SECTION -->
    <div id="overviewSection">

      <h2 class="text-3xl font-bold mb-8">Overview</h2>

      <div class="grid md:grid-cols-3 gap-6">

        <div class="border border-black p-6 rounded-xl">
          <h3 class="font-semibold mb-2">Total Income</h3>
          <p id="totalIncome" class="text-2xl font-bold">₱0.00</p>
        </div>

        <div class="border border-black p-6 rounded-xl">
          <h3 class="font-semibold mb-2">Total Expenses</h3>
          <p id="totalExpenses" class="text-2xl font-bold">₱0.00</p>
        </div>

        <div class="border border-black p-6 rounded-xl">
          <h3 class="font-semibold mb-2">Remaining Balance</h3>
          <p id="remainingBalance" class="text-2xl font-bold">₱0.00</p>
        </div>

      </div>

      <div class="mt-10 border border-black p-6 rounded-xl">
        <h3 class="font-semibold mb-4">Behavioral Insights</h3>
        <p class="text-gray-600">
          Insights will appear here based on spending patterns.
        </p>
      </div>

    </div>


    <!-- TRANSACTIONS SECTION -->
    <div id="transactionsSection" class="hidden">

      <h2 class="text-3xl font-bold mb-8">Transactions</h2>

      <div class="border border-black p-6 rounded-xl mb-8">
        <h3 class="text-xl font-semibold mb-4">Add Transaction</h3>

        <form id="transactionForm" class="grid md:grid-cols-4 gap-4">

          <!-- Wallet Dropdown -->
          <select id="walletSelect"
            class="border border-black p-3 rounded-lg" required>

            <option value="" disabled selected hidden>
              Select Wallet
            </option>

            <option value="">To add</option>
          </select>

          <!-- Description -->
          <input type="text" id="description"
            placeholder="Description"
            class="border border-black p-3 rounded-lg" required>

          <!-- Amount -->
          <input type="number" id="amount"
            placeholder="Amount"
            class="border border-black p-3 rounded-lg" required>

          <!-- Type -->
          <select id="type" 
            class="border border-black p-3 rounded-lg" required>

            <option value="" disabled selected hidden>
              Type
            </option>

            <option value="income">Income</option>
            <option value="expense">Expense</option>
          </select>

          <!-- Category -->
          <div class="md:col-span-4 grid grid-cols-2 gap-4">

            <!-- Category Dropdown -->
            <select id="category"
              class="border border-black p-3 rounded-lg"
              onchange="checkCategory()"
              required>

              <option value="" disabled selected hidden>
                Select Category
              </option>

              <option value="Food">Food</option>
              <option value="Transport">Transport</option>
              <option value="Bills">Bills</option>
              <option value="Shopping">Shopping</option>
              <option value="Salary">Salary</option>
              <option value="Other">Other</option>

            </select>

            <!-- Custom Category Input -->
            <input
              type="text"
              id="customCategory"
              placeholder="Custom Category"
              class="border border-black p-3 rounded-lg invisible"
            >

          </div>

          <button type="submit"
            class="bg-black text-white py-3 rounded-lg md:col-span-4">
            Add Transaction
          </button>

        </form> 
      </div>

      <div>
        <h3 class="text-xl font-semibold mb-4">Transaction List</h3>
        <div id="transactionList"
          class="border border-black p-4 rounded-lg space-y-3">
        </div>
      </div>

    </div>


    <!-- WALLETS SECTION -->
    <div id="walletsSection" class="hidden">

      <h2 class="text-3xl font-bold mb-8">Wallets</h2>

      <div class="border border-black p-6 rounded-xl mb-8">
        <h3 class="text-xl font-semibold mb-4">Add Wallet</h3>

        <form id="walletForm" class="flex gap-4">
          <input 
            type="text" 
            id="walletName"
            placeholder="Wallet Name"
            class="border border-black p-3 rounded-lg flex-1"
            required
          >

          <button type="submit"
            class="bg-black text-white px-6 rounded-lg">
            Add
          </button>
        </form>
      </div>

       <div id="walletCards" class="grid md:grid-cols-3 gap-6"></div>

      </div>

    </div>

  </main>


  <!-- SECTION SWITCHING SCRIPT -->
  <script>
    function showSection(section) {
      document.getElementById("overviewSection").classList.add("hidden");
      document.getElementById("transactionsSection").classList.add("hidden");
      document.getElementById("walletsSection").classList.add("hidden");

      document.getElementById(section + "Section").classList.remove("hidden");
    }

    function logout() {
      window.location.href = "login.html";
    }
  </script>

<script>
  function checkCategory() {
    const category = document.getElementById("category").value;
    const customInput = document.getElementById("customCategory");

    if (category === "Other") {
      customInput.classList.remove("invisible");
      customInput.required = true;
    } else {
      customInput.classList.add("invisible");
      customInput.required = false;
      customInput.value = "";
    }
  }
</script>

<script type="module">
import { initializeApp }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  query,
  where
}
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

import {
  getAuth,
  onAuthStateChanged
}
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";


const firebaseConfig = {
  apiKey: "AIzaSyDZEovu8hv6ms8dDiQN_GaXIf8BDM9kf5g",
  authDomain: "budgetly-6a559.firebaseapp.com",
  projectId: "budgetly-6a559",
  appId: "1:682783929618:web:d2ab6e0f01786e6980efcb"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const form = document.getElementById("transactionForm");
const transactionList = document.getElementById("transactionList");
const walletForm = document.getElementById("walletForm");
const walletNameInput = document.getElementById("walletName");
const walletSelect = document.getElementById("walletSelect");
const walletCards = document.getElementById("walletCards");

const totalIncomeEl = document.getElementById("totalIncome");
const totalExpensesEl = document.getElementById("totalExpenses");
const remainingBalanceEl = document.getElementById("remainingBalance");


// 🔐 Protect dashboard + load transactions
onAuthStateChanged(auth, (user) => {
  if (user) {
    loadTransactions(user.uid);
    loadWallets(user.uid);
  } else {
    window.location.href = "login.html";
  }
});


// ➕ Add Transaction
form.addEventListener("submit", async (e) => {
  e.preventDefault();

  if (!auth.currentUser) {
    alert("User not logged in.");
    return;
  }

  const wallet = document.getElementById("walletSelect").value;
  const description = document.getElementById("description").value;
  const amount = parseFloat(document.getElementById("amount").value);
  const type = document.getElementById("type").value;
  const categorySelect = document.getElementById("category").value;
  const customCategory = document.getElementById("customCategory").value;

  const finalCategory =
    categorySelect === "Other"
      ? customCategory
      : categorySelect;

  try {
    await addDoc(collection(db, "transactions"), {
      userId: auth.currentUser.uid,
      wallet,
      description,
      amount,
      type,
      category: finalCategory,
      createdAt: new Date()
    });

    form.reset();
    document.getElementById("customCategory").classList.add("invisible");

  } catch (error) {
    console.error("Error adding transaction:", error);
  }
});


// Load Transactions Live
function loadTransactions(uid) {

  const q = query(
    collection(db, "transactions"),
    where("userId", "==", uid)
  );

  onSnapshot(q, (snapshot) => {

  transactionList.innerHTML = "";

  let totalIncome = 0;
  let totalExpenses = 0;

  snapshot.forEach((doc) => {
    const data = doc.data();

    if (data.type === "income") {
      totalIncome += data.amount;
    } else {
      totalExpenses += data.amount;
    }

    const div = document.createElement("div");
    div.className =
      "flex justify-between border-b border-black pb-2";

    div.innerHTML = `
      <div>
        <p class="font-semibold">${data.description}</p>
        <p class="text-sm text-gray-600">
          ${data.category} • ${data.wallet}
        </p>
      </div>
      <p class="font-bold ${
        data.type === "income"
          ? "text-green-600"
          : "text-red-600"
      }">
        ₱${data.amount.toFixed(2)}
      </p>
    `;

    transactionList.appendChild(div);
  });

  // -------- UPDATE OVERVIEW --------
  const remaining = totalIncome - totalExpenses;

  totalIncomeEl.textContent = `₱${totalIncome.toFixed(2)}`;
  totalExpensesEl.textContent = `₱${totalExpenses.toFixed(2)}`;
  remainingBalanceEl.textContent = `₱${remaining.toFixed(2)}`;

});
}

function loadWallets(uid) {

  const walletQuery = query(
    collection(db, "wallets"),
    where("userId", "==", uid)
  );

  const transactionQuery = query(
    collection(db, "transactions"),
    where("userId", "==", uid)
  );

  onSnapshot(walletQuery, (walletSnapshot) => {

    onSnapshot(transactionQuery, (transactionSnapshot) => {

      // Clear dropdown
      walletSelect.innerHTML = `
        <option value="" disabled selected hidden>
          Select Wallet
        </option>
      `;

      // Clear wallet cards
      walletCards.innerHTML = "";

      walletSnapshot.forEach((walletDoc) => {

        const walletData = walletDoc.data();
        const walletName = walletData.name;

        // -------- Calculate Balance --------
        let balance = 0;

        transactionSnapshot.forEach((txDoc) => {
          const tx = txDoc.data();

          if (tx.wallet === walletName) {
            if (tx.type === "income") {
              balance += tx.amount;
            } else {
              balance -= tx.amount;
            }
          }
        });

        // -------- Add to Dropdown --------
        const option = document.createElement("option");
        option.value = walletName;
        option.textContent = walletName;
        walletSelect.appendChild(option);

        // -------- Create Wallet Card --------
        const card = document.createElement("div");
        card.className = "border border-black p-6 rounded-xl";

        card.innerHTML = `
          <h3 class="font-semibold">${walletName}</h3>
          <p class="text-xl mt-2 ${balance >= 0 ? "text-green-600" : "text-red-600"}">
            ₱${balance.toFixed(2)}
          </p>
        `;

        walletCards.appendChild(card);

      });

    });

  });
}

walletForm.addEventListener("submit", async (e) => {
  e.preventDefault();

  if (!auth.currentUser) return;

  try {
    await addDoc(collection(db, "wallets"), {
      userId: auth.currentUser.uid,
      name: walletNameInput.value,
      createdAt: new Date()
    });

    walletForm.reset();

  } catch (error) {
    console.error("Error adding wallet:", error);
  }
});

</script>

</body>
</html>
